name: Build EXE

on:
  push:
    paths:
      - 'install.ps1'
      - 'device-guard.ps1'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ps2exe
        run: Install-Module ps2exe -Scope CurrentUser -Force

      - name: Compile install.ps1 -> DeviceGuardInstall.exe
        run: |
          Invoke-ps2exe `
            -inputFile "install.ps1" `
            -outputFile "DeviceGuardInstall.exe" `
            -title "DeviceGuard Setup" `
            -company "YourOrg" `
            -version "1.0.0.0" `
            -requireAdmin

      - name: Compile device-guard.ps1 -> DeviceGuard.exe
        run: |
          Invoke-ps2exe `
            -inputFile "device-guard.ps1" `
            -outputFile "DeviceGuard.exe" `
            -title "DeviceGuard" `
            -company "YourOrg" `
            -version "1.0.0.0" `
            -requireAdmin `
            -noConsole

      - uses: actions/upload-artifact@v4
        with:
          name: DeviceGuard-Build
          path: |
            DeviceGuardInstall.exe
            DeviceGuard.exe